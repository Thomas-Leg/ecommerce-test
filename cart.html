<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LUMIÈRE — Mon Panier</title>

  <!-- Google Tag Manager -->
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-MH6ZCL4P');</script>
  <!-- End Google Tag Manager -->

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --cream: #FAF7F2;
      --espresso: #2C1810;
      --terracotta: #C4714A;
      --sage: #7A8C6E;
      --gold: #B8955A;
      --muted: #9A8F87;
      --card: #FFFFFF;
      --border: #EDE8E0;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--espresso); font-size: 15px; line-height: 1.6; }

    /* HEADER */
    header {
      position: sticky; top: 0; z-index: 100;
      background: var(--cream); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 5vw; height: 70px;
    }
    .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.7rem; font-weight: 300; letter-spacing: .18em; color: var(--espresso); text-decoration: none; }
    .logo span { color: var(--terracotta); }
    .back-link { font-size: .82rem; color: var(--muted); text-decoration: none; letter-spacing: .06em; transition: color .2s; }
    .back-link:hover { color: var(--espresso); }

    /* MAIN */
    .cart-container { max-width: 1000px; margin: 0 auto; padding: 4rem 5vw; display: grid; grid-template-columns: 1fr 340px; gap: 3rem; }
    h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; font-weight: 300; margin-bottom: 2rem; }

    /* CART ITEMS */
    .cart-items { display: flex; flex-direction: column; gap: 1rem; }
    .cart-item {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 4px; padding: 1.2rem;
      display: grid; grid-template-columns: 60px 1fr auto;
      gap: 1rem; align-items: center;
      animation: fadeIn .4s ease both;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .item-emoji { font-size: 2rem; text-align: center; background: var(--cream); border-radius: 4px; padding: .5rem; }
    .item-name { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; margin-bottom: .2rem; }
    .item-category { font-size: .78rem; color: var(--muted); letter-spacing: .06em; text-transform: uppercase; }
    .item-price { font-weight: 500; color: var(--terracotta); font-size: 1rem; }
    .qty-control { display: flex; align-items: center; gap: .5rem; margin-top: .5rem; }
    .qty-btn { background: var(--cream); border: 1px solid var(--border); width: 28px; height: 28px; border-radius: 2px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: background .2s; }
    .qty-btn:hover { background: var(--border); }
    .qty-val { font-size: .9rem; min-width: 20px; text-align: center; }
    .remove-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: .78rem; letter-spacing: .06em; text-transform: uppercase; margin-top: .3rem; transition: color .2s; }
    .remove-btn:hover { color: var(--terracotta); }

    /* SUMMARY */
    .order-summary { background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 1.8rem; height: fit-content; position: sticky; top: 90px; }
    .summary-title { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 400; margin-bottom: 1.5rem; }
    .summary-line { display: flex; justify-content: space-between; font-size: .9rem; margin-bottom: .8rem; color: var(--muted); }
    .summary-line.total { color: var(--espresso); font-weight: 500; font-size: 1rem; border-top: 1px solid var(--border); padding-top: .8rem; margin-top: .5rem; }
    .promo-input { width: 100%; border: 1px solid var(--border); background: var(--cream); padding: .6rem .8rem; font-family: 'DM Sans', sans-serif; font-size: .85rem; border-radius: 2px; margin: 1rem 0 .5rem; }
    .promo-input:focus { outline: none; border-color: var(--terracotta); }
    .btn-checkout {
      width: 100%; background: var(--espresso); color: #fff;
      border: none; padding: 1rem; cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-size: .88rem;
      letter-spacing: .08em; border-radius: 2px; margin-top: 1rem;
      transition: background .2s, transform .15s;
    }
    .btn-checkout:hover { background: var(--terracotta); transform: translateY(-1px); }
    .secure-note { text-align: center; font-size: .75rem; color: var(--muted); margin-top: .8rem; }

    .empty-cart { text-align: center; padding: 4rem 2rem; }
    .empty-cart p { color: var(--muted); margin-bottom: 1.5rem; }
    .btn-back { display: inline-block; background: var(--espresso); color: #fff; padding: .8rem 2rem; text-decoration: none; font-size: .85rem; letter-spacing: .06em; border-radius: 2px; }

    @media (max-width: 768px) { .cart-container { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MH6ZCL4P"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->

<header>
  <a href="index.html" class="logo">LUM<span>I</span>ÈRE</a>
  <a href="index.html" class="back-link">← Continuer mes achats</a>
</header>

<div class="cart-container">
  <div>
    <h1>Mon Panier</h1>
    <div class="cart-items" id="cart-items"></div>
  </div>
  <div class="order-summary">
    <div class="summary-title">Récapitulatif</div>
    <div class="summary-line"><span>Sous-total</span><span id="subtotal">0€</span></div>
    <div class="summary-line"><span>Livraison</span><span id="shipping">Offerte</span></div>
    <div class="summary-line"><span>Réduction</span><span id="discount">—</span></div>
    <div class="summary-line total"><span>Total TTC</span><span id="total">0€</span></div>
    <input class="promo-input" type="text" placeholder="Code promo (ex: LUMIERE15)" id="promo-input"/>
    <button class="btn-checkout" onclick="beginCheckout()">Passer la commande →</button>
    <p class="secure-note">🔒 Paiement 100% sécurisé · SSL</p>
  </div>
</div>

<script>
window.dataLayer = window.dataLayer || [];

// Produits simulés dans le panier (en vrai ce serait en localStorage/session)
const cartItems = [
  { id: 'SKU-001', name: 'Sérum Éclat Vitamine C', brand: 'LUMIÈRE', category: 'Soins Visage', price: 48, emoji: '🌿', qty: 1 },
  { id: 'SKU-002', name: 'Crème Hydratante Rose Musquée', brand: 'LUMIÈRE', category: 'Soins Visage', price: 36, emoji: '🌸', qty: 2 },
];

function getTotal() {
  return cartItems.reduce((sum, p) => sum + p.price * p.qty, 0);
}

function renderCart() {
  const container = document.getElementById('cart-items');
  container.innerHTML = '';

  if (cartItems.length === 0) {
    container.innerHTML = `<div class="empty-cart">
      <p>Votre panier est vide.</p>
      <a href="index.html" class="btn-back">Découvrir nos produits</a>
    </div>`;
    return;
  }

  cartItems.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'cart-item';
    div.style.animationDelay = `${i * 0.08}s`;
    div.innerHTML = `
      <div class="item-emoji">${p.emoji}</div>
      <div>
        <div class="item-name">${p.name}</div>
        <div class="item-category">${p.category}</div>
        <div class="qty-control">
          <button class="qty-btn" onclick="changeQty(${i}, -1)">−</button>
          <span class="qty-val" id="qty-${i}">${p.qty}</span>
          <button class="qty-btn" onclick="changeQty(${i}, 1)">+</button>
        </div>
        <button class="remove-btn" onclick="removeItem(${i})">Supprimer</button>
      </div>
      <div class="item-price">${(p.price * p.qty).toFixed(2)}€</div>`;
    container.appendChild(div);
  });

  const total = getTotal();
  document.getElementById('subtotal').textContent = total + '€';
  document.getElementById('total').textContent = total + '€';
  document.getElementById('shipping').textContent = total >= 50 ? '🎁 Offerte' : '4,90€';
}

function changeQty(index, delta) {
  cartItems[index].qty = Math.max(1, cartItems[index].qty + delta);
  renderCart();
}

function removeItem(index) {
  cartItems.splice(index, 1);
  renderCart();
}

function beginCheckout() {
  const total = getTotal();

  // ✅ GA4 begin_checkout
  dataLayer.push({ ecommerce: null });
  dataLayer.push({
    event: 'begin_checkout',
    ecommerce: {
      currency: 'EUR',
      value: total,
      items: cartItems.map((p, i) => ({
        item_id: p.id,
        item_name: p.name,
        item_brand: p.brand,
        item_category: p.category,
        price: p.price,
        quantity: p.qty,
        index: i
      }))
    }
  });
  console.log('📊 DataLayer push: begin_checkout — Total:', total + '€');

  // Sauvegarde pour la page confirmation
  sessionStorage.setItem('order_items', JSON.stringify(cartItems));
  sessionStorage.setItem('order_total', total);

  // Redirect vers confirmation
  setTimeout(() => window.location.href = 'confirmation.html', 400);
}

// ── GA4 view_cart ──
dataLayer.push({ ecommerce: null });
dataLayer.push({
  event: 'view_cart',
  ecommerce: {
    currency: 'EUR',
    value: getTotal(),
    items: cartItems.map((p, i) => ({
      item_id: p.id, item_name: p.name,
      item_brand: p.brand, item_category: p.category,
      price: p.price, quantity: p.qty, index: i
    }))
  }
});
console.log('📊 DataLayer push: view_cart');

renderCart();
</script>

</body>
</html>
